services:
  postgres:
    image: postgres:16-alpine
    container_name: whm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webhostmanager
      POSTGRES_USER: webhostmanager
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - whm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhostmanager -d webhostmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whm_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - whm_net
    environment:
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      SERVER_ENV: production
      DATABASE_URL: postgres://webhostmanager:secret@whm_postgres:5432/webhostmanager?sslmode=disable
      MIGRATIONS_PATH: file://migrations
      ALLOWED_ORIGINS: "http://localhost:3000"
      JWT_SECRET: "docker-dev-jwt-secret-change-in-prod"
      JWT_EXPIRY_HRS: "24"
      ENCRYPTION_KEY: "docker-dev-enc-key-change-in-prod!"

volumes:
  postgres_data:

networks:
  whm_net:
    driver: bridge
